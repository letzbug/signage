<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UniPop — Programme du jour</title>

  <style>
    :root{
      --bg1:#3b155f; --bg2:#1f2a6b; --bg3:#0d7a6b;
      --card:#ffffff;
      --line: rgba(15, 23, 42, 0.08);
      --text:#0f172a;
      --red:#ef4444; --amber:#f59e0b; --green:#22c55e;
      --radius: 18px;
      --shadow: 0 18px 55px rgba(0,0,0,.30);
      --th: 12px; --td: 14px; --rowH: 64px; --padX: 18px;
    }
    *{ box-sizing:border-box; }
    html, body{ width:100%; height:100%; margin:0; overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

    .bg{ position:fixed; inset:0;
      background:
        radial-gradient(900px 650px at 15% 20%, rgba(239,68,68,.28), transparent 60%),
        radial-gradient(900px 650px at 85% 25%, rgba(13,122,107,.30), transparent 62%),
        radial-gradient(900px 650px at 78% 86%, rgba(31,42,107,.28), transparent 62%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3)); }

    .stage{ position:fixed; inset:0; padding: clamp(14px, 2vw, 24px);
      display:flex; flex-direction:column; gap: clamp(10px, 1.3vw, 16px); }

    .top{ display:grid; grid-template-columns: 320px 1fr 220px;
      align-items:center; gap: 14px; color: rgba(255,255,255,.92); }

    .brand{ display:flex; align-items:center; gap:12px; }
    .logoBox{ width:58px; height:58px; border-radius:14px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18);
      display:grid; place-items:center; box-shadow: 0 10px 30px rgba(0,0,0,.18); }
    .logoU{ font-weight: 900; font-size: 34px; letter-spacing: -1px; }
    .brandText{ line-height: 1.0; }
    .brandLine1{ font-size: 18px; font-weight: 700; opacity:.92; }
    .brandLine2{ font-size: 26px; font-weight: 900; letter-spacing:-.3px; }

    .title{ text-align:center; }
    .titleBig{ font-size: 34px; font-weight: 950; letter-spacing: .6px; text-transform: uppercase; }
    .titleSub{ margin-top: 6px; font-size: 18px; opacity:.92;
      display:flex; justify-content:center; gap: 10px; align-items:center; }
    .dotSep{ opacity:.55; }
    .pill{ display:inline-block; padding: 6px 12px; border-radius: 999px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); }

    .clock{ justify-self:end; display:flex; align-items:flex-end; gap: 8px; }
    .clockTime{ font-size: 52px; font-weight: 950; letter-spacing: -1px; }
    .clockSec{ font-size: 26px; font-weight: 900; transform: translateY(-6px); }

    .card{ flex:1; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.16);
      border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px;
      display:flex; flex-direction:column; gap: 12px; overflow:hidden; }

    .kpis{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .kpi{ background: rgba(255,255,255,.92); border: 1px solid rgba(15,23,42,.08);
      border-radius: 14px; padding: 12px 14px; }
    .kpiNum{ font-size: 30px; font-weight: 950; color: var(--text); line-height:1.05; }
    .kpiLbl{ margin-top: 2px; font-size: 13px; font-weight: 700; color: rgba(15,23,42,.60); }

    .tableWrap{ flex:1; background: var(--card); border-radius: 14px; overflow:hidden;
      border: 1px solid rgba(15,23,42,.06); }

    .tbl{ width:100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
    .tbl thead th{ text-align:left; font-size: var(--th); letter-spacing: .02em; color: rgba(15,23,42,.70);
      font-weight: 800; padding: 14px var(--padX); border-bottom: 1px solid var(--line); background: #ffffff; }
    .tbl tbody td{ font-size: var(--td); color: var(--text); padding: 10px var(--padX); height: var(--rowH);
      border-bottom: 1px solid var(--line); vertical-align: middle; }

    .colDate{ width: 120px; } .colTime{ width: 140px; } .colCourse{ width: 420px; }
    .colPlace{ width: 260px; } .colTrainer{ width: 190px; } .colOcc{ width: 170px; }

    .tbodyScroll{ height: calc(100% - 49px); overflow:hidden; }

    .courseTitle{ font-weight: 800; line-height: 1.15; }
    .courseMeta{ margin-top: 6px; display:flex; gap: 10px; align-items:center; }
    .codePill{ display:inline-flex; align-items:center; padding: 4px 10px; border-radius: 999px;
      background: rgba(15,23,42,.06); border: 1px solid rgba(15,23,42,.08);
      font-size: 12px; font-weight: 800; color: rgba(15,23,42,.75); }

    .occWrap{ display:flex; flex-direction:column; gap: 6px; }
    .occTop{ display:flex; align-items:center; gap: 8px; font-weight: 900; }
    .occDot{ width: 10px; height: 10px; border-radius: 999px; }
    .occDot.green{ background: var(--green); } .occDot.amber{ background: var(--amber); } .occDot.red{ background: var(--red); }
    .occSub{ color: rgba(15,23,42,.70); font-weight: 800; font-size: 12px; }

    .bottom{ display:grid; grid-template-columns: 260px 1fr 320px; gap: 10px; align-items:center; }
    .qrBox{ display:flex; align-items:center; gap: 12px; background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.08); border-radius: 14px; padding: 10px 12px; }
    .qrFake{ width: 66px; height: 66px; border-radius: 12px; background: #fff;
      border: 1px dashed rgba(15,23,42,.25); display:grid; place-items:center; color: rgba(15,23,42,.6); font-weight: 900; }
    .qrTitle{ font-weight: 900; color: var(--text); } .qrSub{ font-weight: 900; color: #e11d2e; }
    .contact{ text-align:center; color: rgba(255,255,255,.92); }
    .contactTitle{ font-weight: 900; letter-spacing: .08em; font-size: 12px; opacity:.95; }
    .contactRow{ margin-top: 4px; font-weight: 700; opacity:.88; }
    .sep{ margin: 0 10px; opacity:.6; }
    .nextBox{ background: rgba(255,255,255,.92); border: 1px solid rgba(15,23,42,.08);
      border-radius: 14px; padding: 10px 12px; text-align:right; }
    .nextLbl{ font-weight: 800; color: rgba(15,23,42,.60); font-size: 12px; }
    .nextVal{ font-weight: 950; color: var(--text); font-size: 18px; margin-top: 2px; }

    /* tiny debug badge (shows JSON status) */
    .dbg{ position:fixed; left:12px; bottom:12px; font-size:12px; font-weight:800;
      padding:6px 10px; border-radius:999px; background: rgba(0,0,0,.45); color:#fff; border:1px solid rgba(255,255,255,.18); }
  </style>
</head>

<body>
  <div class="bg"></div>

  <main class="stage">
    <header class="top">
      <div class="brand">
        <div class="logoBox" aria-hidden="true"><span class="logoU">U</span></div>
        <div class="brandText">
          <div class="brandLine1">Formation</div>
          <div class="brandLine2">UniPop</div>
        </div>
      </div>

      <div class="title">
        <div class="titleBig">PROGRAMME DU JOUR</div>
        <div class="titleSub">
          <span id="dateText">—</span>
          <span class="dotSep">•</span>
          <span class="pill" id="siteText">—</span>
        </div>
      </div>

      <div class="clock">
        <div class="clockTime" id="timeText">--:--</div>
        <div class="clockSec" id="secText">--</div>
      </div>
    </header>

    <section class="card">
      <div class="kpis">
        <div class="kpi"><div class="kpiNum" id="kpiCourses">—</div><div class="kpiLbl">Cours aujourd’hui</div></div>
        <div class="kpi"><div class="kpiNum" id="kpiPeople">—</div><div class="kpiLbl">Participants</div></div>
        <div class="kpi"><div class="kpiNum" id="kpiFull">—</div><div class="kpiLbl">Cours complets</div></div>
        <div class="kpi"><div class="kpiNum" id="kpiNext">—</div><div class="kpiLbl">Prochain</div></div>
      </div>

      <div class="tableWrap">
        <table class="tbl">
          <thead>
            <tr>
              <th class="colDate">Datum</th>
              <th class="colTime">Zeit</th>
              <th class="colCourse">Kurs</th>
              <th class="colPlace">Ort</th>
              <th class="colTrainer">Trainer</th>
              <th class="colOcc">Belegung</th>
            </tr>
          </thead>
        </table>

        <div class="tbodyScroll" id="tbodyScroll">
          <table class="tbl" aria-hidden="true">
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>

      <footer class="bottom">
        <div class="qrBox">
          <div class="qrFake">QR</div>
          <div class="qrLabel">
            <div class="qrTitle">Programme complet</div>
            <div class="qrSub">&amp; inscriptions</div>
          </div>
        </div>

        <div class="contact">
          <div class="contactTitle">UNIVERSITÉ POPULAIRE LUXEMBOURG</div>
          <div class="contactRow">
            <span>+352 247 56 400</span><span class="sep">•</span>
            <span>info@unipop.lu</span><span class="sep">•</span>
            <span>unipop.lu</span>
          </div>
        </div>

        <div class="nextBox">
          <div class="nextLbl">Prochaine session dans:</div>
          <div class="nextVal" id="countdown">—</div>
        </div>
      </footer>
    </section>
  </main>

  <div class="dbg" id="dbg">loading…</div>

  <script>
    const TZ = "Europe/Luxembourg";
    const DATA_URL = "./data/today.json";
    const REFRESH_MS = 60000;
    const SCROLL_SPEED_PX_PER_SEC = 28;
    const SCROLL_PAUSE_MS = 1400;
    const ROW_MIN_FOR_SCROLL = 7;

    const dbg = document.getElementById("dbg");
    const elDate = document.getElementById("dateText");
    const elSite = document.getElementById("siteText");
    const elTime = document.getElementById("timeText");
    const elSec  = document.getElementById("secText");

    const elKpiCourses = document.getElementById("kpiCourses");
    const elKpiPeople  = document.getElementById("kpiPeople");
    const elKpiFull    = document.getElementById("kpiFull");
    const elKpiNext    = document.getElementById("kpiNext");

    const elRows = document.getElementById("rows");
    const tbodyScroll = document.getElementById("tbodyScroll");
    const countdownEl = document.getElementById("countdown");

    let cache = [];
    let scrollState = { running:false, dir:1, raf:0, lastTs:0, pauseUntil:0 };

    function nowLux(){ return new Date(); }
    function fmtDateLong(d){
      return new Intl.DateTimeFormat("fr-FR",{timeZone:TZ,weekday:"long",day:"2-digit",month:"long",year:"numeric"}).format(d);
    }
    function fmtTimeHM(d){
      return new Intl.DateTimeFormat("fr-FR",{timeZone:TZ,hour:"2-digit",minute:"2-digit",hour12:false}).format(d);
    }
    function fmtSec(d){ return new Intl.DateTimeFormat("fr-FR",{timeZone:TZ,second:"2-digit"}).format(d); }
    function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }
    function escapeHtml(str){
      return String(str ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function safeNum(x,f=0){ const n=Number(x); return Number.isFinite(n)?n:f; }
    function parseHHMM(s){
      const m=/^(\d{1,2}):(\d{2})$/.exec(String(s).trim()); if(!m) return null;
      const hh=Number(m[1]), mm=Number(m[2]); if(Number.isNaN(hh)||Number.isNaN(mm)) return null;
      return hh*60+mm;
    }
    function pad2(n){ return String(n).padStart(2,"0"); }
    function formatDateDMY(iso){
      const s=String(iso||""); if(/^\d{4}-\d{2}-\d{2}$/.test(s)){ const [y,m,d]=s.split("-"); return `${d}.${m}.${y}`; }
      return s || "—";
    }
    function occPercent(enrolled, capacity){ if(!capacity||capacity<=0) return 0; return Math.round((enrolled/capacity)*100); }
    function occDotClass(pct){ if(pct>=95) return "green"; if(pct>=70) return "amber"; return "red"; }
    function sortByStart(items){
      return [...items].sort((a,b)=> (parseHHMM(a.start||"99:99")??9999) - (parseHHMM(b.start||"99:99")??9999));
    }

    function computeKPIs(items){
      const totalCourses = items.length;
      const totalPeople = items.reduce((s,x)=> s + safeNum(x.enrolled,0), 0);
      const fullCount = items.filter(x => safeNum(x.capacity,0)>0 && safeNum(x.enrolled,0)>=safeNum(x.capacity,0)).length;

      const cur = parseHHMM(fmtTimeHM(nowLux()));
      const next = sortByStart(items).find(x => {
        const s = parseHHMM(x.start||"");
        return cur!=null && s!=null && s>=cur;
      }) || null;

      elKpiCourses.textContent = String(totalCourses);
      elKpiPeople.textContent  = String(totalPeople);
      elKpiFull.textContent    = String(fullCount);
      elKpiNext.textContent    = next ? next.start : "—";
      return next;
    }

    function updateCountdown(next){
      if(!next){ countdownEl.textContent="—"; return; }
      const cur = parseHHMM(fmtTimeHM(nowLux()));
      const nxt = parseHHMM(next.start||"");
      if(cur==null||nxt==null){ countdownEl.textContent=`${next.start||"—"} • ${next.title||""}`; return; }
      let diff = nxt-cur; if(diff<0) diff=0;
      const h=Math.floor(diff/60), m=diff%60;
      countdownEl.textContent = `${pad2(h)}h ${pad2(m)}m • ${next.start} • ${next.title}`;
    }

    function render(dateISO, items){
      const dateTxt = formatDateDMY(dateISO);
      elRows.innerHTML="";
      for(const c of items){
        const code = c.coursCode || c.code || c.id || "—";
        const place = c.lieu || c.site || "—";
        const trainer = c.trainer || c.formateur || "—";
        const enrolled = safeNum(c.enrolled ?? c.nbInscrits ?? 0);
        const capacity = safeNum(c.capacity ?? c.nbPlaces ?? 0);
        const pct = occPercent(enrolled, capacity);
        const dot = occDotClass(pct);
        const capShow = capacity>0 ? capacity : Math.max(enrolled,0);

        const tr=document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(dateTxt)}</td>
          <td>${escapeHtml(`${c.start}–${c.end}`)}</td>
          <td>
            <div class="courseTitle">${escapeHtml(c.title||"—")}</div>
            <div class="courseMeta"><span class="codePill">${escapeHtml(String(code))}</span></div>
          </td>
          <td>${escapeHtml(place)}</td>
          <td>${escapeHtml(trainer)}</td>
          <td>
            <div class="occWrap">
              <div class="occTop"><span class="occDot ${dot}"></span><span>${pct}%</span></div>
              <div class="occSub">${enrolled}/${capShow}</div>
            </div>
          </td>`;
        elRows.appendChild(tr);
      }
    }

    function stopAutoScroll(){
      scrollState.running=false;
      cancelAnimationFrame(scrollState.raf);
      scrollState.raf=0; scrollState.lastTs=0; scrollState.pauseUntil=0;
      tbodyScroll.scrollTop=0;
    }
    function setupAutoScroll(rowCount){
      stopAutoScroll();
      const canScroll = tbodyScroll.scrollHeight > tbodyScroll.clientHeight + 4;
      if(!canScroll || rowCount < ROW_MIN_FOR_SCROLL) return;

      scrollState.running=true;
      scrollState.dir=1;
      scrollState.pauseUntil=performance.now()+SCROLL_PAUSE_MS;

      const step=(ts)=>{
        if(!scrollState.running) return;
        if(!scrollState.lastTs) scrollState.lastTs=ts;
        const dt=(ts-scrollState.lastTs)/1000; scrollState.lastTs=ts;

        if(ts < scrollState.pauseUntil){ scrollState.raf=requestAnimationFrame(step); return; }

        const max = tbodyScroll.scrollHeight - tbodyScroll.clientHeight;
        const delta = SCROLL_SPEED_PX_PER_SEC * dt * scrollState.dir;
        tbodyScroll.scrollTop = Math.max(0, Math.min(max, tbodyScroll.scrollTop + delta));

        if(tbodyScroll.scrollTop<=0 && scrollState.dir<0){
          scrollState.dir=1; scrollState.pauseUntil=ts+SCROLL_PAUSE_MS;
        } else if(tbodyScroll.scrollTop>=max-1 && scrollState.dir>0){
          scrollState.dir=-1; scrollState.pauseUntil=ts+SCROLL_PAUSE_MS;
        }
        scrollState.raf=requestAnimationFrame(step);
      };
      scrollState.raf=requestAnimationFrame(step);
    }

    function tickClock(){
      const n=nowLux();
      elTime.textContent = fmtTimeHM(n);
      elSec.textContent  = fmtSec(n);
      elDate.textContent = capitalize(fmtDateLong(n));
    }

    async function load(){
      dbg.textContent = "loading json…";
      const res = await fetch(DATA_URL + `?v=${Date.now()}`, {cache:"no-store"});
      if(!res.ok) throw new Error("fetch " + res.status);
      const json = await res.json();

      const dateISO = json.date || "";
      const site = json.site || "UniPop";
      const list = Array.isArray(json.courses) ? json.courses : [];

      elSite.textContent = site;
      const items = sortByStart(list);
      cache = items;

      render(dateISO, items);
      const next = computeKPIs(items);
      updateCountdown(next);
      setupAutoScroll(items.length);

      dbg.textContent = `OK • rows: ${items.length}`;
    }

    tickClock(); setInterval(tickClock, 250);
    load().catch(err => { dbg.textContent = "ERR • " + err.message; });
    setInterval(()=> load().catch(err => { dbg.textContent = "ERR • " + err.message; }), REFRESH_MS);
    setInterval(()=> { const next = computeKPIs(cache); updateCountdown(next); }, 60000);
  </script>
</body>
</html>
