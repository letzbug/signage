<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniPop — Signage (Heute)</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1a2e;
      --text:#e7eefc;
      --muted:#b7c4e6;
      --line:rgba(255,255,255,.10);
      --ok:#35d07f;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --accent:#6aa9ff;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:var(--sans);
      background: radial-gradient(1200px 600px at 10% -10%, rgba(106,169,255,.35), transparent 60%),
                  radial-gradient(900px 500px at 110% 10%, rgba(53,208,127,.25), transparent 55%),
                  var(--bg);
      color:var(--text);
      overflow:hidden; /* fullscreen signage */
    }

    header{
      padding:18px 22px 14px;
      border-bottom:1px solid var(--line);
      background: linear-gradient(to bottom, rgba(11,18,32,.92), rgba(11,18,32,.65));
      backdrop-filter: blur(10px);
    }
    .top{
      display:grid;
      grid-template-columns: 340px 1fr 260px;
      gap:16px;
      align-items:center;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
    }
    .logo{
      width:56px; height:56px; border-radius:16px;
      display:grid; place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      font-weight:900; font-size:30px;
    }
    .brandtxt{line-height:1}
    .brandtxt .a{font-weight:800; opacity:.9}
    .brandtxt .b{font-weight:950; font-size:26px; letter-spacing:-.2px}

    .title{
      text-align:center;
    }
    .title .h{
      font-size:34px;
      font-weight:950;
      letter-spacing:.6px;
      text-transform:uppercase;
      margin:0;
    }
    .title .s{
      margin-top:6px;
      color:var(--muted);
      display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
      font-size:14px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background: rgba(255,255,255,.04);
      font-size:12px;
    }
    .pill code{font-family:var(--mono); color:var(--text)}

    .clock{
      justify-self:end;
      display:flex; align-items:flex-end; gap:10px;
      font-family:var(--mono);
    }
    .clock .t{font-size:52px; font-weight:900; letter-spacing:-1px;}
    .clock .s{font-size:22px; font-weight:800; opacity:.9; transform: translateY(-6px);}

    main{
      height: calc(100% - 108px);
      padding: 16px 22px 18px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .kpis{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .kpi{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      min-height: 74px;
    }
    .kpi .t{font-size:12px; color:var(--muted)}
    .kpi .v{font-size:26px; font-weight:900; margin-top:6px}

    .card{
      flex:1;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .tableHead{
      padding: 10px 14px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
      color: var(--muted);
      font-size:12px;
    }

    table{
      width:100%;
      border-collapse: collapse;
      font-size: 14px;
      table-layout: fixed;
    }
    th, td{
      padding:12px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th{
      text-align:left;
      color: var(--muted);
      font-weight:700;
      font-size:12px;
      white-space:nowrap;
    }

    /* Spaltenbreiten wie in deinem Screenshot */
    th:nth-child(1), td:nth-child(1){ width:120px; } /* Datum */
    th:nth-child(2), td:nth-child(2){ width:140px; } /* Zeit */
    th:nth-child(4), td:nth-child(4){ width:280px; } /* Ort */
    th:nth-child(5), td:nth-child(5){ width:200px; } /* Trainer */
    th:nth-child(6), td:nth-child(6){ width:180px; } /* Belegung */

    td:nth-child(3){ white-space:normal; word-break:break-word; }

    .scroll{
      flex:1;
      overflow:hidden; /* wir scrollen per JS smooth */
    }

    .courseLine{
      display:flex; align-items:center; gap:10px;
      flex-wrap:wrap;
      min-width:0;
    }
    .courseTitle{
      flex:1 1 340px;
      min-width: 260px;
      font-weight:800;
      line-height:1.15;
    }
    .courseid{
      display:inline-flex; align-items:center; gap:6px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(231,238,252,.95);
      white-space:nowrap;
    }

    .tag{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      font-size:12px;
      white-space:nowrap;
    }
    .dot{width:10px; height:10px; border-radius:999px; background: var(--accent);}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    .muted{color:var(--muted)}
    .mono{font-family:var(--mono)}

    .dbg{
      position: fixed;
      left: 14px;
      bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,26,46,.85);
      color: var(--text);
      font: 12px var(--mono);
      display:none; /* set to block if you want */
    }
  </style>
</head>

<body>
<header>
  <div class="top">
    <div class="brand">
      <div class="logo">U</div>
      <div class="brandtxt">
        <div class="a">Formation</div>
        <div class="b">UniPop</div>
      </div>
    </div>

    <div class="title">
      <h1 class="h">PROGRAMME DU JOUR</h1>
      <div class="s">
        <span class="pill">Date: <code id="dateLabel">–</code></span>
        <span class="pill">Filtre: <code>UNIPOP</code></span>
        <span class="pill">Source: <code id="srcLabel">data/trainings.json</code></span>
      </div>
    </div>

    <div class="clock">
      <div class="t" id="clockTime">--:--</div>
      <div class="s" id="clockSec">--</div>
    </div>
  </div>
</header>

<main>
  <section class="kpis">
    <div class="kpi"><div class="t">Kurse heute (UniPop)</div><div class="v" id="kpiCourses">–</div></div>
    <div class="kpi"><div class="t">Teilnehmende (gebucht)</div><div class="v" id="kpiBooked">–</div></div>
    <div class="kpi"><div class="t">Plätze (gebucht/gesamt)</div><div class="v" id="kpiSlots">–</div></div>
    <div class="kpi"><div class="t">Ø Auslastung</div><div class="v" id="kpiOcc">–</div></div>
  </section>

  <section class="card">
    <div class="tableHead">
      <div id="lastRefresh">Letzter Refresh: –</div>
      <div id="itemCount">Items: –</div>
    </div>

    <div class="scroll" id="scroll">
      <table>
        <thead>
          <tr>
            <th>Datum</th>
            <th>Zeit</th>
            <th>Kurs</th>
            <th>Ort</th>
            <th>Trainer</th>
            <th>Belegung</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="muted">Noch keine Daten geladen…</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<div class="dbg" id="dbg">dbg</div>

<script>
  const DATA_URL = "data/trainings.json";   // ✅ WICHTIG: wie gestern!
  const TZ = "Europe/Luxembourg";

  const el = (id)=>document.getElementById(id);
  const tbody = el("tbody");
  const dateLabel = el("dateLabel");
  const srcLabel = el("srcLabel");
  const lastRefresh = el("lastRefresh");
  const itemCount = el("itemCount");
  const dbg = el("dbg");

  const kpiCourses = el("kpiCourses");
  const kpiBooked  = el("kpiBooked");
  const kpiSlots   = el("kpiSlots");
  const kpiOcc     = el("kpiOcc");

  const clockTime = el("clockTime");
  const clockSec  = el("clockSec");

  const scrollBox = el("scroll");

  let rawCourses = [];
  let sessionsToday = [];
  let scrollState = { running:false, dir:1, raf:0, lastTs:0, pauseUntil:0 };

  function luxNow(){
    return new Date(new Date().toLocaleString("en-US", { timeZone: TZ }));
  }
  function ymdLocal(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function fmtDate(d){ return d.toLocaleDateString("de-DE", { timeZone: TZ }); }
  function fmtTime(d){ return d.toLocaleTimeString("de-DE", { timeZone: TZ, hour:"2-digit", minute:"2-digit" }); }

  function parseFRDateDDMMYYYY(s){
    if(!s || typeof s !== "string") return null;
    const m = s.trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(!m) return null;
    const dd = Number(m[1]), mm = Number(m[2]), yyyy = Number(m[3]);
    const d = new Date(yyyy, mm-1, dd, 0,0,0,0);
    return isNaN(d) ? null : d;
  }
  function parseTimeHHMM(s){
    if(!s || typeof s !== "string") return null;
    const m = s.trim().match(/^(\d{2}):(\d{2})$/);
    if(!m) return null;
    return { h: Number(m[1]), m: Number(m[2]) };
  }
  function parseDurationToMinutes(s){
    if(!s) return null;
    if(typeof s === "number") return s;
    if(typeof s !== "string") return null;
    const t = s.trim().toLowerCase();
    const mh = t.match(/^(\d+)\s*h(?:\s*(\d+))?$/); // 1h40 / 2h
    if(mh){
      const h = Number(mh[1]);
      const min = mh[2] ? Number(mh[2]) : 0;
      return h*60 + min;
    }
    const m2 = t.match(/^(\d+)\s*min$/);
    if(m2) return Number(m2[1]);
    const m3 = t.match(/^(\d+)$/);
    if(m3) return Number(m3[1]);
    return null;
  }
  const FR_DAY_TO_JS = {
    "lundi": 1, "mardi": 2, "mercredi": 3, "jeudi": 4, "vendredi": 5, "samedi": 6, "dimanche": 0
  };
  function jsDayFromFR(fr){
    if(!fr) return null;
    const key = String(fr).trim().toLowerCase();
    return (key in FR_DAY_TO_JS) ? FR_DAY_TO_JS[key] : null;
  }
  function makeDateTimeOnDay(dayDate, hhmm){
    const d = new Date(dayDate);
    d.setHours(hhmm.h, hhmm.m, 0, 0);
    return d;
  }
  function overlaps(aStart, aEnd, bStart, bEnd){
    return aStart < bEnd && aEnd > bStart;
  }
  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function occPct(booked, capacity){
    if(!(Number.isFinite(booked) && Number.isFinite(capacity) && capacity > 0)) return null;
    return Math.max(0, Math.min(100, (booked / capacity) * 100));
  }
  function occDotClass(p){
    if(p === null) return "dot";
    if(p >= 80) return "dot ok";
    if(p >= 50) return "dot warn";
    return "dot bad";
  }

  function getItems(payload){
    if(Array.isArray(payload)) return payload;
    if(payload && typeof payload === "object"){
      for(const k of ["items","data","trainings","results"]){
        if(Array.isArray(payload[k])) return payload[k];
      }
      const vals = Object.values(payload);
      if(vals.length && vals.slice(0, Math.min(vals.length,20)).every(v => v && typeof v === "object" && !Array.isArray(v))) return vals;
    }
    return [];
  }

  function passesUniPop(c){
    const orgCode = (c.organisateur && c.organisateur.code) ? String(c.organisateur.code) : "";
    return orgCode === "UNIPOP";
  }

  function buildTodaySessions(){
    const now = luxNow();
    const todayYMD = ymdLocal(now);

    const startRange = new Date(todayYMD + "T00:00:00");
    const endRange   = new Date(todayYMD + "T23:59:59");

    const out = [];

    for(const c of rawCourses){
      if(!c || typeof c !== "object") continue;
      if(!passesUniPop(c)) continue;

      const dStart = parseFRDateDDMMYYYY(c.dateDebut);
      const dEnd = parseFRDateDDMMYYYY(c.dateFin);
      if(!dStart || !dEnd) continue;

      const dEndExclusive = new Date(dEnd.getTime() + 24*3600*1000);
      if(!overlaps(dStart, dEndExclusive, startRange, endRange)) continue;

      const title = c.intitule || "(sans intitulé)";
      const location = (c.adresseCours && (c.adresseCours.nom || c.adresseCours.localite || "")) || "";
      const trainer = Array.isArray(c.enseignants) && c.enseignants.length
        ? c.enseignants.map(x => [x.prenom, x.nom].filter(Boolean).join(" ").trim()).filter(Boolean).join(", ")
        : "";

      const booked = Number.isFinite(Number(c.nbInscrits)) ? Number(c.nbInscrits) : null;
      const capacity = Number.isFinite(Number(c.nbPlaces)) ? Number(c.nbPlaces) : null;

      const horaires = Array.isArray(c.horaires) ? c.horaires : [];
      if(!horaires.length) continue;

      // nur heute berechnen
      const day0 = new Date(startRange);
      day0.setHours(0,0,0,0);
      if(day0 < dStart || day0 > dEnd) continue;

      const jsDay = day0.getDay();

      for(const h of horaires){
        const targetJsDay = jsDayFromFR(h.jour);
        if(targetJsDay === null || targetJsDay !== jsDay) continue;

        const hhmm = parseTimeHHMM(h.heure);
        if(!hhmm) continue;

        const durMin = parseDurationToMinutes(h.duree);
        if(!durMin) continue;

        const sdt = makeDateTimeOnDay(day0, hhmm);
        const edt = new Date(sdt.getTime() + durMin*60000);

        out.push({
          courseId: c.coursCode || c.coursId || c.id || "",
          title,
          date: new Date(day0),
          start: sdt,
          end: edt,
          location,
          trainer,
          booked,
          capacity,
        });
      }
    }

    sessionsToday = out.sort((a,b)=>a.start-b.start);
    dateLabel.textContent = fmtDate(startRange);
  }

  function render(){
    if(!sessionsToday.length){
      tbody.innerHTML = `<tr><td colspan="6" class="muted">Keine UniPop-Kurse für heute gefunden.</td></tr>`;
      return;
    }

    tbody.innerHTML = sessionsToday.map(it => {
      const d = fmtDate(it.start);
      const t = `${fmtTime(it.start)}–${fmtTime(it.end)}`;

      const p = occPct(it.booked, it.capacity);
      const occText = (p === null)
        ? `<span class="muted">n/a</span>`
        : `<span class="tag"><span class="${occDotClass(p)}"></span>${Math.round(p)}%</span>
           <div class="muted" style="margin-top:6px;font-size:12px;">${it.booked}/${it.capacity}</div>`;

      const idInline = it.courseId
        ? `<span class="courseid">${escapeHtml(it.courseId)}</span>`
        : ``;

      return `<tr>
        <td>${d}</td>
        <td class="mono">${t}</td>
        <td>
          <div class="courseLine">
            <span class="courseTitle">${escapeHtml(it.title)}</span>
            ${idInline}
          </div>
        </td>
        <td>${escapeHtml(it.location || "")}</td>
        <td>${escapeHtml(it.trainer || "")}</td>
        <td>${occText}</td>
      </tr>`;
    }).join("");

    // KPIs
    const courses = sessionsToday.length;
    let bookedSum = 0, capSum = 0, occSum = 0, occCount = 0;

    for(const it of sessionsToday){
      const p = occPct(it.booked, it.capacity);
      if(p !== null){
        bookedSum += it.booked;
        capSum += it.capacity;
        occSum += p;
        occCount += 1;
      }
    }

    kpiCourses.textContent = String(courses);
    kpiBooked.textContent  = occCount ? String(bookedSum) : "–";
    kpiSlots.textContent   = occCount ? `${bookedSum}/${capSum}` : "–";
    kpiOcc.textContent     = occCount ? `${Math.round(occSum/occCount)}%` : "–";
  }

  // auto-scroll (wenn zu viele Zeilen)
  function stopAutoScroll(){
    scrollState.running = false;
    cancelAnimationFrame(scrollState.raf);
    scrollState.raf = 0;
    scrollState.lastTs = 0;
    scrollState.pauseUntil = 0;
    scrollBox.scrollTop = 0;
  }
  function setupAutoScroll(){
    stopAutoScroll();

    // kann nur scrollen, wenn Inhalte höher als Box
    const canScroll = scrollBox.scrollHeight > scrollBox.clientHeight + 4;
    if(!canScroll || sessionsToday.length < 7) return;

    const SPEED = 28;      // px/sec
    const PAUSE = 1400;    // ms

    scrollState.running = true;
    scrollState.dir = 1;
    scrollState.pauseUntil = performance.now() + PAUSE;

    const step = (ts)=>{
      if(!scrollState.running) return;

      if(!scrollState.lastTs) scrollState.lastTs = ts;
      const dt = (ts - scrollState.lastTs)/1000;
      scrollState.lastTs = ts;

      if(ts < scrollState.pauseUntil){
        scrollState.raf = requestAnimationFrame(step);
        return;
      }

      const max = scrollBox.scrollHeight - scrollBox.clientHeight;
      scrollBox.scrollTop = Math.max(0, Math.min(max, scrollBox.scrollTop + SPEED*dt*scrollState.dir));

      if(scrollBox.scrollTop <= 0 && scrollState.dir < 0){
        scrollState.dir = 1;
        scrollState.pauseUntil = ts + PAUSE;
      }else if(scrollBox.scrollTop >= max - 1 && scrollState.dir > 0){
        scrollState.dir = -1;
        scrollState.pauseUntil = ts + PAUSE;
      }

      scrollState.raf = requestAnimationFrame(step);
    };
    scrollState.raf = requestAnimationFrame(step);
  }

  async function load(){
    srcLabel.textContent = DATA_URL;
    const res = await fetch(DATA_URL + `?v=${Date.now()}`, { cache:"no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    rawCourses = getItems(payload);

    itemCount.textContent = "Items: " + rawCourses.length;
    lastRefresh.textContent = "Letzter Refresh: " + new Date().toLocaleString("de-DE");

    buildTodaySessions();
    render();
    setupAutoScroll();
  }

  function tickClock(){
    const n = luxNow();
    clockTime.textContent = n.toLocaleTimeString("de-DE", { timeZone: TZ, hour:"2-digit", minute:"2-digit" });
    clockSec.textContent  = n.toLocaleTimeString("de-DE", { timeZone: TZ, second:"2-digit" });
  }

  // boot
  tickClock(); setInterval(tickClock, 250);
  load().catch(err => {
    tbody.innerHTML = `<tr><td colspan="6" class="muted">Fehler beim Laden: ${escapeHtml(err.message)}</td></tr>`;
  });
  setInterval(()=> load().catch(()=>{}), 60_000);
</script>
</body>
</html>
